<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<title>Painel de Atributos</title>

<style>

body{
  margin:0;
  padding:0;
  font-family:Arial,sans-serif;
  font-size:11px;
  background:#efefef;
  color:#222;
  overflow:hidden;
}

.app{
  display:flex;
  height:100vh;
}

.sidebar{
  width:260px;
  min-width:260px;
  border-right:1px solid #c8c8c8;
  overflow-y:auto;
  padding:6px;
  box-sizing:border-box;
  background:#f3f3f3;
}

.inspector{
  flex:1;
  overflow-y:auto;
  padding:8px;
  box-sizing:border-box;
  background:#f7f7f7;
}

.section{
  margin-bottom:10px;
}

.section-title{
  font-size:11px;
  font-weight:bold;
  margin-bottom:5px;
}

button{
  font-size:11px;
  padding:3px 6px;
  border:1px solid #bcbcbc;
  background:#e8e8e8;
  cursor:pointer;
}

button:hover{
  background:#dddddd;
}

input, select{
  width:100%;
  box-sizing:border-box;
  font-size:11px;
  padding:3px;
  margin-bottom:4px;
  border:1px solid #bcbcbc;
  background:white;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
  margin-top:5px;
}

.grid-item{
  display:flex;
  align-items:center;
  gap:3px;
  padding:2px 0;
}

.native-item{
  border:1px solid #c8c8c8;
  background:white;
  padding:10px 8px;
  min-height:56px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  text-align:center;
}

.native-item:hover{
  background:#f0f8ff;
}

.native-name{
  font-weight:bold;
  text-transform:uppercase;
}

.native-category{
  margin-top:4px;
  font-size:10px;
  color:#666;
}

.native-indicator{
  margin-left:8px;
  font-size:10px;
  color:#005a9e;
  font-weight:bold;
}

.list{
  border:1px solid #c8c8c8;
  background:white;
  max-height:420px;
  overflow-y:auto;
}

.row-buttons{
  display:flex;
  gap:4px;
}

.row-buttons button{
  flex:1;
}

.attr-table{
  border:1px solid #c8c8c8;
  background:white;
  height:calc(100vh - 24px);
  overflow-y:auto;
}

.attr-line{
  border-bottom:1px solid #ececec;
}

.attr-row{
  display:grid;
  grid-template-columns:22px 180px 1fr 22px;
  align-items:center;
}

.attr-label{
  padding:5px;
  border-right:1px solid #ececec;
  background:#f5f5f5;
  cursor:pointer;
}

.attr-label:hover{
  background:#ececec;
}

.attr-input{
  padding:5px;
  word-break:break-word;
}

.attr-expand{
  display:flex;
  align-items:center;
  justify-content:center;
  border-left:1px solid #ececec;
  cursor:pointer;
  user-select:none;
}

.attr-expand:hover{
  background:#f0f0f0;
}

.attr-details{
  display:none;
  padding:6px;
  background:#fafafa;
  border-top:1px solid #ececec;
}

.detail-line{
  display:grid;
  grid-template-columns:100px 1fr;
  margin-bottom:4px;
}

.detail-label{
  color:#666;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:8px;
}

.checkbox{
  width:12px;
  height:12px;
  margin:0;
}

.selected-attr{
  background:#dfe8f5 !important;
}

.collection-item{
  padding:4px 6px;
  border-bottom:1px solid #ececec;
  cursor:pointer;
}

.collection-item:hover{
  background:#efefef;
}

.collection-selected{
  background:#dfe8f5;
}

.mode-label{
  margin-bottom:4px;
  color:#666;
}

.repo-row{
  display:flex;
  align-items:center;
  gap:6px;
  width:100%;
}

.repo-check{
  width:12px;
  height:12px;
  margin:0;
}

.collection-header{
  background:#dadada;
  font-weight:bold;
}

.collection-actions{
  display:flex;
  gap:4px;
  margin-top:4px;
}

.collection-actions button{
  flex:1;
}

.inspector-check{
  width:12px;
  height:12px;
  margin-left:5px;
}

.collection-preview{
  background:#f7f7f7;
  border-bottom:1px solid #d9d9d9;
  padding-left:14px;
}

.collection-preview-item{
  padding:3px 0;
  display:flex;
  align-items:center;
  gap:6px;
}

.collection-preview-item input{
  width:12px;
  height:12px;
  margin:0;
}

.repo-global-title{
  background:#ececec;
  font-weight:bold;
  padding:4px 6px;
  border-top:1px solid #cfcfcf;
  border-bottom:1px solid #cfcfcf;
}

.empty-state{
  padding:10px;
  color:#777;
}

.attr-result{
  font-size:10px;
  color:#777;
  margin-top:2px;
}

</style>

</head>

<body onload="initializeRuntime()">

<div class="app">

  <div class="sidebar">

    <div class="section">

      <div class="section-title">
        Catálogo Nativo
      </div>

      <div class="row-buttons">

        <button onclick="refreshNativeCatalog()">
          Atualizar Catálogo
        </button>

        <button onclick="toggleGrid()">
          Exibir / Ocultar
        </button>

      </div>

      
<div class="row-buttons">
  <button onclick="selectAllNativeAttributes()">Selecionar Todos</button>
  <button onclick="clearNativeAttributes()">Limpar</button>
</div>
<div id="nativeCatalogGrid"></div>


    </div>

    <div class="section">

      <div class="section-title">
        Editor de Atributo
        <span id="nativeIndicator" class="native-indicator"></span>
      </div>

      <div class="mode-label" id="editorMode">
        CREATE MODE
      </div>

      <input type="text" id="attributeName" placeholder="Nome">
      <input type="text" id="attributeLabel" placeholder="Label">
      <input type="text" id="attributeUnits" placeholder="Units">
      <input type="text" id="attributeFormulaUnits" placeholder="Formula Units">
      <input type="text" id="attributeAccess" placeholder="Access">
      <input type="text" id="attributeFormLabel" placeholder="Form Label">
      <input type="text" id="attributeOptions" placeholder="Options">
      <input type="text" id="attributeValue" placeholder="Valor">
      <input type="text" id="attributeFormula" placeholder="Formula">
      <input type="text" id="attributeSource" placeholder="Source" readonly style="background:#f5f5f5;">

      <div class="row-buttons">

        <button
          id="primaryActionButton"
          onclick="primaryAction()">

          Adicionar Atributo

        </button>

        <button onclick="clearEditor()">
          Limpar
        </button>

      </div>

    </div>

    <div class="section">

      <div class="section-title">
        Coleções
      </div>

      <div class="collection-actions">

        <button onclick="saveCollection()">
          Salvar
        </button>

        <button onclick="updateCollection()">
          Atualizar
        </button>

      </div>

      <div class="collection-actions">

        <button onclick="deleteCollection()">
          Excluir
        </button>

        <button onclick="clearCollectionSelection()">
          Limpar
        </button>

      </div>

      <div class="collection-actions">

        <button onclick="applySelectedAttributes()">
          Aplicar Selecionados
        </button>

      </div>

      <div class="collection-actions">

        <button onclick="copyInspectorSelectionToRepository()">
          Copiar do Inspetor
        </button>

      </div>

    </div>

    <div class="section">

      <div class="section-title">
        Biblioteca de Atributos
      </div>

      <div class="list" id="collectionList"></div>

    </div>

  </div>

  <div class="inspector">

    <div class="topbar">

      <div class="section-title">
        Inspetor de Atributos
      </div>

      <button onclick="refreshInspector()">
        Atualizar
      </button>

    </div>

    <div class="attr-table" id="attrTable">

      <div class="empty-state">
        Nenhum componente selecionado.
      </div>

    </div>

  </div>

</div>

<script src="js/app.js"></script>

</body>
</html>
